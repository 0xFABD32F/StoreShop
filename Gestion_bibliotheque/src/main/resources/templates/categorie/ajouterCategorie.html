<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Catégorie</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/user-management.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>

<body>
    <!-- Inclure la navar -->
    <div th:insert="~{template1 :: navbar}"></div>

    <div class="container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 600px;">
            <div class="card-header bg-success text-white">
                <h2 class="mb-0">➕ Ajouter une Catégorie</h2>
            </div>
            
            <div class="card-body">
                <!-- Afficher les erreurs si présentes -->
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Erreur!</strong> <span th:text="${param.error[0]}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post" th:action="@{/admin/categories/add}" th:object="${categorie}">
                    <!-- Token CSRF pour Spring Security -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom de la catégorie <span class="text-danger">*</span></label>
                        <input type="text" 
                               class="form-control" 
                               id="nom" 
                               th:field="*{nom}" 
                               placeholder="Ex: Livre, DVD, Magazine..."
                               required>
                        <div class="form-text">Le nom doit être unique.</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-success">
                            💾 Enregistrer
                        </button>
                        <a th:href="@{/admin/categories}" class="btn btn-secondary">
                            ❌ Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
