<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Liste des Catégories</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/user-management.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>

<body>
    <!-- Inclure la navbar -->
    <div th:insert="~{template1 :: navbar}"></div>

    <div class="container mt-4">
        <div class="card p-2 m-2">
            <div class="card-header">
                <h1 class="mb-0">📂 Liste des Catégories</h1>
            </div>

            <div class="card-body">
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Erreur!</strong> <span th:text="${param.error[0]}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <a sec:authorize="hasRole('ADMIN')" 
                   th:href="@{/admin/categories/add}" 
                   class="btn btn-success mb-3">
                    ➕ Ajouter une catégorie
                </a>
                
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th sec:authorize="hasRole('ADMIN')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="categorie : ${listeCategories}">
                                <td th:text="${categorie.id}"></td>
                                <td><strong th:text="${categorie.nom}"></strong></td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <a th:href="@{/admin/categories/edit(id=${categorie.id})}" 
                                       class="btn btn-sm btn-primary">
                                        ✏️ Modifier
                                    </a>
                                    <a onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette catégorie ?')"
                                       th:href="@{/admin/categories/delete(id=${categorie.id})}" 
                                       class="btn btn-sm btn-danger">
                                        🗑️ Supprimer
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(listeCategories)}">
                                <td colspan="3" class="text-center">
                                    <em>Aucune catégorie disponible</em>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
